databases:
  - name: estaciona-bariloche-db
    plan: free

services:
  - type: web
    name: estaciona-bariloche-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install --include=dev && cp prisma/schema.production.prisma prisma/schema.prisma && npx prisma generate && npx prisma db push --accept-data-loss && npm run build && npm run seed
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: estaciona-bariloche-db
          property: connectionString
